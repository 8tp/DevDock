<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1F2E"/>
      <stop offset="100%" stop-color="#13131B"/>
    </linearGradient>

    <!-- Accent glow gradient -->
    <radialGradient id="glowGrad" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#7AA2F7" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#7AA2F7" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#7AA2F7" stop-opacity="0"/>
    </radialGradient>

    <!-- Blue accent gradient for main element -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#89B4FA"/>
      <stop offset="100%" stop-color="#6B93E0"/>
    </linearGradient>

    <!-- Green gradient -->
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8D86E"/>
      <stop offset="100%" stop-color="#8BBE58"/>
    </linearGradient>

    <!-- Purple gradient -->
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8A8FF"/>
      <stop offset="100%" stop-color="#A87DE8"/>
    </linearGradient>

    <!-- Pink/red gradient -->
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8CA0"/>
      <stop offset="100%" stop-color="#E0627A"/>
    </linearGradient>

    <!-- Border glow filter -->
    <filter id="borderGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft shadow for dock panels -->
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Glow for active panel -->
    <filter id="activeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle pulse dot glow -->
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip for rounded rectangle -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Main rounded rectangle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#glowGrad)" clip-path="url(#roundedClip)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="1016" height="1016" rx="218" ry="218" fill="none" stroke="#7AA2F7" stroke-width="2.5" stroke-opacity="0.35"/>

  <!-- Inner subtle border for depth -->
  <rect x="12" y="12" width="1000" height="1000" rx="214" ry="214" fill="none" stroke="#3B4261" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Background grid pattern (subtle) -->
  <g opacity="0.04" clip-path="url(#roundedClip)">
    <line x1="256" y1="100" x2="256" y2="924" stroke="#7AA2F7" stroke-width="1"/>
    <line x1="512" y1="100" x2="512" y2="924" stroke="#7AA2F7" stroke-width="1"/>
    <line x1="768" y1="100" x2="768" y2="924" stroke="#7AA2F7" stroke-width="1"/>
    <line x1="100" y1="340" x2="924" y2="340" stroke="#7AA2F7" stroke-width="1"/>
    <line x1="100" y1="512" x2="924" y2="512" stroke="#7AA2F7" stroke-width="1"/>
    <line x1="100" y1="684" x2="924" y2="684" stroke="#7AA2F7" stroke-width="1"/>
  </g>

  <!-- === DOCK / COMMAND CENTER DESIGN === -->

  <!-- Top bar - simulating a window/panel header -->
  <rect x="222" y="228" width="580" height="44" rx="10" ry="10" fill="#24283B" opacity="0.8"/>

  <!-- Traffic light dots in header -->
  <circle cx="252" cy="250" r="8" fill="#F7768E" opacity="0.9"/>
  <circle cx="278" cy="250" r="8" fill="#E0AF68" opacity="0.9"/>
  <circle cx="304" cy="250" r="8" fill="#9ECE6A" opacity="0.9"/>

  <!-- Header title bar lines (simulating text) -->
  <rect x="440" y="243" width="120" height="5" rx="2.5" fill="#565F89" opacity="0.5"/>
  <rect x="580" y="243" width="60" height="5" rx="2.5" fill="#565F89" opacity="0.3"/>

  <!-- === MAIN DOCK PANELS === -->
  <!-- 4 dock panels arranged as a 2x2 command center grid -->

  <!-- Panel 1: Top-left (Services / Green) -->
  <g filter="url(#panelShadow)">
    <rect x="222" y="296" width="275" height="180" rx="16" ry="16" fill="#1E2030"/>
    <rect x="222" y="296" width="275" height="180" rx="16" ry="16" fill="none" stroke="#3B4261" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Mini status bars inside -->
    <rect x="248" y="326" width="80" height="6" rx="3" fill="#9ECE6A" opacity="0.9"/>
    <rect x="248" y="346" width="120" height="5" rx="2.5" fill="#565F89" opacity="0.4"/>
    <rect x="248" y="362" width="95" height="5" rx="2.5" fill="#565F89" opacity="0.3"/>
    <!-- Small indicator dot -->
    <circle cx="465" cy="326" r="6" fill="#9ECE6A" opacity="0.8"/>
    <!-- Mini bar chart -->
    <rect x="248" y="420" width="18" height="36" rx="4" fill="#9ECE6A" opacity="0.3"/>
    <rect x="276" y="400" width="18" height="56" rx="4" fill="#9ECE6A" opacity="0.5"/>
    <rect x="304" y="412" width="18" height="44" rx="4" fill="#9ECE6A" opacity="0.4"/>
    <rect x="332" y="390" width="18" height="66" rx="4" fill="#9ECE6A" opacity="0.6"/>
  </g>

  <!-- Panel 2: Top-right (Main / Blue - HIGHLIGHTED) -->
  <g filter="url(#activeGlow)">
    <rect x="527" y="296" width="275" height="180" rx="16" ry="16" fill="#1A1F36"/>
    <rect x="527" y="296" width="275" height="180" rx="16" ry="16" fill="none" stroke="#7AA2F7" stroke-width="2" stroke-opacity="0.7"/>
    <!-- Code bracket motif -->
    <text x="556" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="700" fill="#7AA2F7" opacity="0.95">&lt;/&gt;</text>
    <!-- Terminal-like lines -->
    <rect x="553" y="380" width="60" height="5" rx="2.5" fill="#7AA2F7" opacity="0.5"/>
    <rect x="553" y="396" width="140" height="5" rx="2.5" fill="#7AA2F7" opacity="0.35"/>
    <rect x="553" y="412" width="100" height="5" rx="2.5" fill="#7AA2F7" opacity="0.25"/>
    <!-- Cursor blink indicator -->
    <rect x="553" y="432" width="12" height="18" rx="2" fill="#7AA2F7" opacity="0.8"/>
    <!-- Connection dots -->
    <circle cx="760" cy="340" r="5" fill="#7AA2F7" opacity="0.6"/>
    <circle cx="760" cy="365" r="5" fill="#BB9AF7" opacity="0.5"/>
    <circle cx="760" cy="390" r="5" fill="#9ECE6A" opacity="0.5"/>
    <line x1="745" y1="340" x2="760" y2="340" stroke="#7AA2F7" stroke-width="1.5" opacity="0.4"/>
    <line x1="745" y1="365" x2="760" y2="365" stroke="#BB9AF7" stroke-width="1.5" opacity="0.3"/>
    <line x1="745" y1="390" x2="760" y2="390" stroke="#9ECE6A" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Panel 3: Bottom-left (Logs / Purple) -->
  <g filter="url(#panelShadow)">
    <rect x="222" y="500" width="275" height="180" rx="16" ry="16" fill="#1E2030"/>
    <rect x="222" y="500" width="275" height="180" rx="16" ry="16" fill="none" stroke="#3B4261" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Log lines -->
    <rect x="248" y="530" width="16" height="5" rx="2.5" fill="#BB9AF7" opacity="0.6"/>
    <rect x="272" y="530" width="140" height="5" rx="2.5" fill="#565F89" opacity="0.35"/>
    <rect x="248" y="548" width="16" height="5" rx="2.5" fill="#7AA2F7" opacity="0.6"/>
    <rect x="272" y="548" width="100" height="5" rx="2.5" fill="#565F89" opacity="0.3"/>
    <rect x="248" y="566" width="16" height="5" rx="2.5" fill="#9ECE6A" opacity="0.6"/>
    <rect x="272" y="566" width="170" height="5" rx="2.5" fill="#565F89" opacity="0.25"/>
    <rect x="248" y="584" width="16" height="5" rx="2.5" fill="#F7768E" opacity="0.6"/>
    <rect x="272" y="584" width="120" height="5" rx="2.5" fill="#565F89" opacity="0.3"/>
    <rect x="248" y="602" width="16" height="5" rx="2.5" fill="#BB9AF7" opacity="0.6"/>
    <rect x="272" y="602" width="155" height="5" rx="2.5" fill="#565F89" opacity="0.2"/>
    <rect x="248" y="620" width="16" height="5" rx="2.5" fill="#7AA2F7" opacity="0.6"/>
    <rect x="272" y="620" width="90" height="5" rx="2.5" fill="#565F89" opacity="0.35"/>
    <rect x="248" y="638" width="16" height="5" rx="2.5" fill="#E0AF68" opacity="0.6"/>
    <rect x="272" y="638" width="130" height="5" rx="2.5" fill="#565F89" opacity="0.25"/>
    <rect x="248" y="656" width="16" height="5" rx="2.5" fill="#9ECE6A" opacity="0.6"/>
    <rect x="272" y="656" width="110" height="5" rx="2.5" fill="#565F89" opacity="0.3"/>
  </g>

  <!-- Panel 4: Bottom-right (Ports / Pink) -->
  <g filter="url(#panelShadow)">
    <rect x="527" y="500" width="275" height="180" rx="16" ry="16" fill="#1E2030"/>
    <rect x="527" y="500" width="275" height="180" rx="16" ry="16" fill="none" stroke="#3B4261" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Port grid tiles -->
    <rect x="553" y="530" width="56" height="44" rx="8" fill="#2A2E42" stroke="#F7768E" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="581" y="558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#F7768E" text-anchor="middle" opacity="0.9">3000</text>

    <rect x="621" y="530" width="56" height="44" rx="8" fill="#2A2E42" stroke="#9ECE6A" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="649" y="558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#9ECE6A" text-anchor="middle" opacity="0.9">8080</text>

    <rect x="689" y="530" width="56" height="44" rx="8" fill="#2A2E42" stroke="#7AA2F7" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="717" y="558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#7AA2F7" text-anchor="middle" opacity="0.9">5432</text>

    <rect x="553" y="586" width="56" height="44" rx="8" fill="#2A2E42" stroke="#BB9AF7" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="581" y="614" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#BB9AF7" text-anchor="middle" opacity="0.8">6379</text>

    <rect x="621" y="586" width="56" height="44" rx="8" fill="#2A2E42" stroke="#E0AF68" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="649" y="614" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#E0AF68" text-anchor="middle" opacity="0.8">4200</text>

    <rect x="689" y="586" width="56" height="44" rx="8" fill="#2A2E42" stroke="#565F89" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="707" y="602" width="20" height="3" rx="1.5" fill="#565F89" opacity="0.3"/>
    <rect x="707" y="612" width="14" height="3" rx="1.5" fill="#565F89" opacity="0.2"/>
  </g>

  <!-- === BOTTOM DOCK BAR === -->
  <rect x="282" y="720" width="460" height="64" rx="18" ry="18" fill="#24283B" opacity="0.7"/>
  <rect x="282" y="720" width="460" height="64" rx="18" ry="18" fill="none" stroke="#3B4261" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Dock bar items (4 small icons) -->
  <!-- Projects icon (folder) -->
  <rect x="324" y="738" width="28" height="22" rx="4" fill="#9ECE6A" opacity="0.7"/>
  <rect x="324" y="733" width="14" height="7" rx="2" fill="#9ECE6A" opacity="0.7"/>

  <!-- Ports icon (grid) -->
  <rect x="408" y="735" width="11" height="11" rx="2" fill="#F7768E" opacity="0.6"/>
  <rect x="423" y="735" width="11" height="11" rx="2" fill="#F7768E" opacity="0.6"/>
  <rect x="408" y="750" width="11" height="11" rx="2" fill="#F7768E" opacity="0.6"/>
  <rect x="423" y="750" width="11" height="11" rx="2" fill="#F7768E" opacity="0.6"/>

  <!-- Active: Command icon (bracket) - highlighted -->
  <g filter="url(#pulseGlow)">
    <rect x="481" y="730" width="44" height="40" rx="10" fill="#7AA2F7" opacity="0.15"/>
    <text x="503" y="758" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="700" fill="#7AA2F7" text-anchor="middle" opacity="0.95">&gt;_</text>
  </g>
  <!-- Active indicator dot -->
  <circle cx="503" cy="776" r="3" fill="#7AA2F7" opacity="0.9"/>

  <!-- Logs icon (lines) -->
  <rect x="568" y="738" width="22" height="4" rx="2" fill="#BB9AF7" opacity="0.6"/>
  <rect x="568" y="746" width="28" height="4" rx="2" fill="#BB9AF7" opacity="0.5"/>
  <rect x="568" y="754" width="18" height="4" rx="2" fill="#BB9AF7" opacity="0.6"/>

  <!-- Settings icon (gear-like) -->
  <circle cx="650" cy="752" r="10" fill="none" stroke="#565F89" stroke-width="3" opacity="0.5"/>
  <circle cx="650" cy="752" r="4" fill="#565F89" opacity="0.5"/>

  <!-- === SUBTLE ACCENT DECORATIONS === -->

  <!-- Top-right corner accent -->
  <circle cx="820" cy="180" r="4" fill="#7AA2F7" opacity="0.3"/>
  <circle cx="840" cy="200" r="3" fill="#BB9AF7" opacity="0.2"/>
  <circle cx="810" cy="210" r="2" fill="#9ECE6A" opacity="0.2"/>

  <!-- Connection lines between panels (subtle) -->
  <line x1="497" y1="386" x2="527" y2="386" stroke="#3B4261" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="360" y1="476" x2="360" y2="500" stroke="#3B4261" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="665" y1="476" x2="665" y2="500" stroke="#3B4261" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Outer glow ring (very subtle) -->
  <rect x="-2" y="-2" width="1028" height="1028" rx="222" ry="222" fill="none" stroke="#7AA2F7" stroke-width="1" stroke-opacity="0.1"/>
</svg>