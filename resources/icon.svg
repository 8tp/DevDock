<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#131520"/>

  <!-- Bold geometric "D" monogram — fills the icon space -->
  <!-- The D is built from a thick vertical bar + a large curved right side -->
  <!-- It suggests both "D" for DevDock and a terminal/dock shape -->
  <path d="
    M280,200
    L280,824
    L480,824
    C680,824 800,700 800,512
    C800,324 680,200 480,200
    Z
    M400,340
    L470,340
    C600,340 670,400 670,512
    C670,624 600,684 470,684
    L400,684
    Z
  " fill="#7AA2F7"/>

  <!-- Accent notch — a small glowing bar inside the D, suggests a cursor/terminal -->
  <rect x="440" y="478" width="140" height="68" rx="10" fill="#131520"/>
  <rect x="456" y="494" width="108" height="36" rx="6" fill="#9ECE6A"/>
</svg>
