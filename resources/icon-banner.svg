<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1B26"/>
      <stop offset="100%" stop-color="#13141D"/>
    </linearGradient>
    <linearGradient id="topGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7AA2F7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7AA2F7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7AA2F7"/>
      <stop offset="100%" stop-color="#5D7CE0"/>
    </linearGradient>
    <linearGradient id="bR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BB9AF7"/>
      <stop offset="100%" stop-color="#9D7AE0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7AA2F7"/>
      <stop offset="40%" stop-color="#BB9AF7"/>
      <stop offset="75%" stop-color="#9ECE6A"/>
      <stop offset="100%" stop-color="#9ECE6A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2030"/>
      <stop offset="100%" stop-color="#111219"/>
    </linearGradient>
    <linearGradient id="iconGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7AA2F7" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#7AA2F7" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="0.7" fill="#565F89" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#topGlow)"/>

  <!-- Side accents -->
  <rect x="0" y="220" width="3" height="200" rx="1.5" fill="#7AA2F7" opacity="0.35"/>
  <rect x="1277" y="200" width="3" height="240" rx="1.5" fill="#BB9AF7" opacity="0.25"/>

  <!-- App icon (left side) -->
  <g transform="translate(160, 120)" filter="url(#shadow)">
    <rect width="400" height="400" rx="88" fill="url(#iconBg)"/>
    <rect width="400" height="200" rx="88" fill="url(#iconGlow)"/>
    <rect x="3" y="3" width="394" height="394" rx="85" fill="none" stroke="#7AA2F7" stroke-width="2" stroke-opacity="0.18"/>

    <!-- Left bracket -->
    <polygon points="132,114 130,118 77,200 130,282 132,286 108,286 56,200 108,114" fill="#7AA2F7"/>
    <!-- Right bracket -->
    <polygon points="268,114 270,118 323,200 270,282 268,286 292,286 344,200 292,114" fill="#BB9AF7"/>
    <!-- Center bars -->
    <rect x="168" y="161" width="64" height="11" rx="5.5" fill="#9ECE6A"/>
    <rect x="175" y="184" width="50" height="11" rx="5.5" fill="#7AA2F7"/>
    <rect x="182" y="207" width="36" height="11" rx="5.5" fill="#E0AF68"/>
    <!-- Dots -->
    <circle cx="188" cy="240" r="4" fill="#9ECE6A"/>
    <circle cx="200" cy="240" r="4" fill="#9ECE6A" opacity="0.45"/>
    <circle cx="212" cy="240" r="4" fill="#9ECE6A" opacity="0.2"/>
  </g>

  <!-- Right side: "DevDock" spelled out with geometric path letters -->
  <g transform="translate(640, 190)" fill="#C0CAF5">
    <!-- D -->
    <path d="M0,0 L0,88 L38,88 C68,88 86,68 86,44 C86,20 68,0 38,0 Z M20,18 L36,18 C54,18 66,28 66,44 C66,60 54,70 36,70 L20,70 Z"/>
    <!-- e -->
    <path d="M106,32 C106,14 120,0 140,0 C160,0 174,14 174,32 L174,48 L126,48 C127,62 135,70 147,70 C156,70 163,65 167,58 L173,70 C168,78 157,84 146,84 C122,84 106,68 106,54 Z M126,38 L155,38 C155,24 149,16 140,16 C131,16 126,24 126,38 Z"/>
    <!-- v -->
    <path d="M188,2 L218,84 L248,2 L268,2 L228,88 L208,88 L168,2 Z"/>
  </g>
  <g transform="translate(640, 190)" fill="#7AA2F7">
    <!-- D (second, blue) -->
    <path d="M284,0 L284,88 L322,88 C352,88 370,68 370,44 C370,20 352,0 322,0 Z M304,18 L320,18 C338,18 350,28 350,44 C350,60 338,70 320,70 L304,70 Z"/>
    <!-- o -->
    <path d="M392,44 C392,20 408,0 432,0 C456,0 472,20 472,44 C472,68 456,88 432,88 C408,88 392,68 392,44 Z M412,44 C412,62 420,72 432,72 C444,72 452,62 452,44 C452,26 444,16 432,16 C420,16 412,26 412,44 Z"/>
    <!-- c -->
    <path d="M492,44 C492,20 508,0 532,0 C548,0 560,10 566,22 L552,32 C548,22 542,16 532,16 C518,16 512,28 512,44 C512,60 518,72 532,72 C542,72 548,66 552,56 L566,66 C560,78 548,88 532,88 C508,88 492,68 492,44 Z"/>
    <!-- k -->
    <path d="M580,0 L580,88 L600,88 L600,56 L608,46 L640,88 L664,88 L622,36 L660,0 L636,0 L600,40 L600,0 Z"/>
  </g>

  <!-- Accent underline -->
  <rect x="640" y="298" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Tagline area: feature indicators instead of text -->
  <g transform="translate(640, 340)">
    <!-- Five colored feature pills -->
    <!-- Projects -->
    <circle cx="10" cy="12" r="6" fill="#9ECE6A"/>
    <rect x="24" y="4" width="72" height="16" rx="8" fill="#24283B"/>
    <rect x="32" y="9" width="22" height="6" rx="3" fill="#3B4261"/>
    <rect x="58" y="9" width="30" height="6" rx="3" fill="#3B4261"/>

    <!-- Ports -->
    <circle cx="124" cy="12" r="6" fill="#7AA2F7"/>
    <rect x="138" y="4" width="56" height="16" rx="8" fill="#24283B"/>
    <rect x="146" y="9" width="16" height="6" rx="3" fill="#3B4261"/>
    <rect x="166" y="9" width="20" height="6" rx="3" fill="#3B4261"/>

    <!-- Logs -->
    <circle cx="218" cy="12" r="6" fill="#BB9AF7"/>
    <rect x="232" y="4" width="48" height="16" rx="8" fill="#24283B"/>
    <rect x="240" y="9" width="32" height="6" rx="3" fill="#3B4261"/>

    <!-- Stacks -->
    <circle cx="304" cy="12" r="6" fill="#F7768E"/>
    <rect x="318" y="4" width="60" height="16" rx="8" fill="#24283B"/>
    <rect x="326" y="9" width="20" height="6" rx="3" fill="#3B4261"/>
    <rect x="350" y="9" width="20" height="6" rx="3" fill="#3B4261"/>

    <!-- Docker -->
    <circle cx="402" cy="12" r="6" fill="#E0AF68"/>
    <rect x="416" y="4" width="64" height="16" rx="8" fill="#24283B"/>
    <rect x="424" y="9" width="24" height="6" rx="3" fill="#3B4261"/>
    <rect x="452" y="9" width="20" height="6" rx="3" fill="#3B4261"/>
  </g>

  <!-- Version pill -->
  <rect x="640" y="400" width="56" height="24" rx="12" fill="#24283B" stroke="#3B4261" stroke-width="1"/>
  <rect x="652" y="408" width="14" height="8" rx="4" fill="#565F89"/>
  <rect x="670" y="408" width="18" height="8" rx="4" fill="#565F89"/>

  <!-- Floating decorative dots -->
  <circle cx="1120" cy="140" r="3" fill="#7AA2F7" opacity="0.3"/>
  <circle cx="1180" cy="220" r="2" fill="#BB9AF7" opacity="0.25"/>
  <circle cx="1100" cy="400" r="2.5" fill="#9ECE6A" opacity="0.2"/>
  <circle cx="1200" cy="480" r="2" fill="#F7768E" opacity="0.2"/>
</svg>
