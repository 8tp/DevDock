<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1B26"/>
      <stop offset="100%" stop-color="#13131B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.35" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="#7AA2F7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7AA2F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7AA2F7"/>
      <stop offset="35%" stop-color="#BB9AF7"/>
      <stop offset="70%" stop-color="#9ECE6A"/>
      <stop offset="100%" stop-color="#7AA2F7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1F2E"/>
      <stop offset="100%" stop-color="#13131B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#565F89" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Decorative side accents -->
  <rect x="0" y="200" width="3" height="240" rx="1.5" fill="#7AA2F7" opacity="0.4"/>
  <rect x="1277" y="180" width="3" height="280" rx="1.5" fill="#BB9AF7" opacity="0.3"/>

  <!-- App Icon (centered-left) -->
  <g transform="translate(120, 120)" filter="url(#shadow)">
