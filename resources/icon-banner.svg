    <rect x="262" y="228" width="42" height="30" rx="4" fill="#24283B" stroke="#7AA2F7" stroke-width="1" stroke-opacity="0.6"/>
    <rect x="309" y="228" width="42" height="30" rx="4" fill="#24283B" stroke="#BB9AF7" stroke-width="1" stroke-opacity="0.6"/>
